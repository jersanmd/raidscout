<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#09090b;font-family:system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#09090b;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;">
          
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:0;">
                    <img src="{{ .SiteURL }}logo.png" alt="RaidScout" width="40" height="40" style="display:block;border-radius:10px;" />
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#18181b;border:1px solid #27272a;border-radius:16px;padding:40px 32px;">
              
              <h1 style="margin:0 0 8px;font-size:24px;font-weight:700;color:#fafafa;text-align:center;">Confirm your email</h1>
              <p style="margin:0 0 32px;font-size:14px;color:#a1a1aa;text-align:center;line-height:1.6;">
                Click the button below to verify <strong style="color:#d4d4d8;">{{ .Email }}</strong> and unlock all RaidScout features.
              </p>

              <!-- Button -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#fafafa;color:#09090b;font-size:14px;font-weight:600;padding:14px 36px;border-radius:10px;text-decoration:none;">Confirm Email</a>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <tr>
                <td style="padding:28px 0 0;">
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="border-top:1px solid #27272a;"></td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Fallback -->
              <p style="margin:24px 0 0;font-size:12px;color:#52525b;text-align:center;line-height:1.6;">
                Button not working? Copy and paste this link:
              </p>
              <p style="margin:8px 0 0;font-size:12px;color:#71717a;text-align:center;word-break:break-all;line-height:1.6;">
                {{ .ConfirmationURL }}
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:11px;color:#52525b;">
                RaidScout — Guild Operations Platform
              </p>
              <p style="margin:4px 0 0;font-size:11px;color:#3f3f46;">
                You received this email because you signed up at <a href="{{ .SiteURL }}" style="color:#52525b;text-decoration:underline;">raidscout.com</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>

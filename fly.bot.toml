app = "raidscout-bot"
[build]
  dockerfile = "Dockerfile.bot"
[env]
  NODE_OPTIONS = "--max-old-space-size=384"
  NOTIFY_PORT = "8080"
[[vm]]
  memory = "512mb"
  cpu = "shared-cpu-1x"
[[services]]
  protocol = "tcp"
  internal_port = 8080
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
